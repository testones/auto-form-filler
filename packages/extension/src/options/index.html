<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简历自动填充助手 - 设置</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; color: #333; }
    h1 { color: #1890ff; margin-bottom: 20px; }
    .section { background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 16px; }
    .section h2 { font-size: 16px; margin-bottom: 12px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-weight: 600; margin-bottom: 4px; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 8px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px;
    }
    .btn { padding: 8px 20px; background: #1890ff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .btn:hover { background: #096dd9; }
    .json-editor { width: 100%; min-height: 400px; font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>
  <h1>简历自动填充助手 - 高级设置</h1>
  <div id="root">
    <div class="section">
      <h2>简历数据 (JSON)</h2>
      <p style="color:#999;font-size:13px;margin-bottom:12px;">直接编辑 JSON 数据，保存后生效。</p>
      <div class="field">
        <textarea id="json-editor" class="json-editor"></textarea>
      </div>
      <button class="btn" id="btn-save">保存</button>
      <button class="btn" id="btn-reset" style="background:#ff4d4f;margin-left:8px;">重置默认</button>
      <span id="status" style="margin-left:12px;color:#52c41a;"></span>
    </div>
    <div class="section">
      <h2>支持的招聘网站</h2>
      <ul style="list-style:none;padding-left:0;">
        <li style="padding:4px 0;">✅ BOSS直聘 (React + 自研组件)</li>
        <li style="padding:4px 0;">✅ 智联招聘 (Vue + Element UI)</li>
        <li style="padding:4px 0;">✅ 猎聘 (React + Ant Design)</li>
        <li style="padding:4px 0;">✅ 前程无忧 (Vue + 自研组件)</li>
        <li style="padding:4px 0;">✅ 拉勾网 (React + 自研组件)</li>
      </ul>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
